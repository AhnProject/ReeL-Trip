# apps/api-spring/railway.toml

[build]
builder = "nixpacks"
nixpacksPlan = '{ "providers": ["node", "java"], "setup": { "pkgs": ["jdk17", "maven"] } }'
buildCommand = "mvn clean package -DskipTests --no-transfer-progress"

[deploy]
startCommand = "java -jar target/api-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/api/documents/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3