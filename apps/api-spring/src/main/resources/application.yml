spring:
  application:
    name: reel-trip-api

  datasource:
    hikari:
      maximum-pool-size: 3
      max-lifetime: 60000        # 1분 (Neon 5분 타임아웃보다 짧게)
      keepalive-time: 30000      # 30초마다 커넥션 유지
      connection-timeout: 20000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime → "2024-01-01T00:00:00" (ISO 8601)
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:4000}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-must-be-at-least-32-chars}
  expires-in: ${JWT_EXPIRATION:86400000}

openai:
  api-key: ${OPENAI_API_KEY:}          # 비어있으면 OPENAI_API_KEY_MISSING 에러 반환
  embedding-model: text-embedding-3-small
  vector-dim: ${VECTOR_DIMENSION:1536}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash

apify:
  api-token: ${APIFY_API_TOKEN:}
  actor-id: ${APIFY_ACTOR_ID:shu8hvrXbJbY3Eb9W}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  allowed-origin-suffixes: ${ALLOWED_ORIGIN_SUFFIXES:}

api:
  base-url: ${API_BASE_URL:http://localhost:4000}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.reeltrip.api
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  default-produces-media-type: application/json
