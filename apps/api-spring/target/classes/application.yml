spring:
  application:
    name: reel-trip-api

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime → "2024-01-01T00:00:00" (ISO 8601)
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:4000}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-must-be-at-least-32-chars}
  expires-in: ${JWT_EXPIRATION:86400000}

openai:
  api-key: ${OPENAI_API_KEY:}          # 비어있으면 OPENAI_API_KEY_MISSING 에러 반환
  embedding-model: text-embedding-3-small
  vector-dim: ${VECTOR_DIMENSION:1536}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}       # 비어있으면 ANTHROPIC_API_KEY_MISSING 에러 반환
  model: claude-opus-4-6

apify:
  api-token: ${APIFY_API_TOKEN:}
  actor-id: ${APIFY_ACTOR_ID:apify~instagram-reel-scraper}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  allowed-origin-suffixes: ${ALLOWED_ORIGIN_SUFFIXES:}

api:
  base-url: ${API_BASE_URL:http://localhost:4000}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.reeltrip.api
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
  default-produces-media-type: application/json
